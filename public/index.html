<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Список пользователей</title>
<link href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css" rel="stylesheet"/>
<script src="https://code.jquery.com/jquery-2.2.4.min.js"></script>
</head>
<body style="padding:20px">

<h2>Список пользователей</h2>
<hr/>

<div id="auth-block">
  <h4>Вход</h4>
  <div class="form-group">
    <label>Логин:</label>
    <input class="form-control" id="inp-user" value="admin" style="max-width:200px"/>
  </div>
  <div class="form-group">
    <label>Пароль:</label>
    <input class="form-control" type="password" id="inp-pass" value="secret" style="max-width:200px"/>
  </div>
  <button class="btn btn-primary btn-sm" onclick="doLogin()">Войти</button>
  <button class="btn btn-default btn-sm" onclick="doRegister()">Регистрация</button>
  <p class="text-muted" style="margin-top:6px"><small>Тест: admin / secret</small></p>
</div>

<div id="main-block" style="display:none">
  <p>Вы вошли как: <strong id="lbl-user"></strong> <a href="#" onclick="doLogout()">выйти</a></p>
  <hr/>

  <h4>Добавить пользователя <small class="text-muted">(только admin)</small></h4>
  <form id="userForm" style="max-width:400px">
    <input type="hidden" id="edit-id" value="0"/>
    <div class="form-group">
      <label>Имя:</label>
      <input class="form-control" id="f-name"/>
    </div>
    <div class="form-group">
      <label>Возраст:</label>
      <input class="form-control" id="f-age" type="number"/>
    </div>
    <div class="form-group">
      <label>Email:</label>
      <input class="form-control" id="f-email"/>
    </div>
    <button type="submit" class="btn btn-primary btn-sm">Сохранить</button>
    <button type="button" class="btn btn-default btn-sm" onclick="resetForm()">Сбросить</button>
  </form>

  <hr/>
  <h4>Поиск</h4>
  <input class="form-control" id="inp-search" placeholder="Имя или email..." style="max-width:300px;margin-bottom:10px" oninput="debounce()"/>

  <table class="table table-bordered table-condensed table-striped" style="max-width:700px">
    <thead>
      <tr>
        <th>ID</th><th>Имя</th><th>Возраст</th><th>Email</th><th>Роль</th><th></th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
  <div id="pagination"></div>

  <hr/>
  <h4>Статистика</h4>
  <p id="stats-text" class="text-muted">—</p>
</div>

<div id="msg" style="position:fixed;bottom:16px;right:16px;"></div>

<script>
var token = null, page = 1, st = null;

function api(method, url, body, cb) {
  var opts = {
    method: method,
    headers: {'Content-Type':'application/json'}
  };
  if (token) opts.headers['Authorization'] = 'Bearer ' + token;
  if (body)  opts.body = JSON.stringify(body);
  fetch(url, opts).then(function(r){ return r.json().then(function(d){ cb(r.ok, d); }); }).catch(function(){ cb(false, {}); });
}

function toast(msg, ok) {
  var d = document.getElementById('msg');
  d.innerHTML = '<div class="alert alert-'+(ok!==false?'success':'danger')+' alert-dismissible" style="margin:0;min-width:220px">'+msg+'</div>';
  setTimeout(function(){ d.innerHTML=''; }, 3000);
}

function doLogin() {
  var u = document.getElementById('inp-user').value;
  var p = document.getElementById('inp-pass').value;
  api('POST', '/api/auth/login', {username:u,password:p}, function(ok,d){
    if (ok) {
      token = d.token;
      document.getElementById('auth-block').style.display = 'none';
      document.getElementById('main-block').style.display  = 'block';
      document.getElementById('lbl-user').textContent = d.username + ' [' + d.role + ']';
      loadUsers(); loadStats();
      toast('Добро пожаловать, ' + d.username);
    } else {
      toast(d.error || 'Ошибка входа', false);
    }
  });
}

function doRegister() {
  var u = document.getElementById('inp-user').value;
  var p = document.getElementById('inp-pass').value;
  api('POST', '/api/auth/register', {username:u,password:p}, function(ok,d){
    toast(ok ? 'Аккаунт создан' : (d.error||'Ошибка'), ok);
  });
}

function doLogout() {
  token = null;
  document.getElementById('auth-block').style.display = 'block';
  document.getElementById('main-block').style.display  = 'none';
  document.getElementById('tbody').innerHTML = '';
}

function loadUsers() {
  var q = document.getElementById('inp-search').value;
  var url = '/api/users?page='+page+'&limit=5';
  if (q) url += '&search='+encodeURIComponent(q);
  api('GET', url, null, function(ok,d){
    if (!ok) return;
    var html = '';
    d.data.forEach(function(u){
      html += '<tr><td>'+u.id+'</td><td>'+esc(u.name)+'</td><td>'+u.age+'</td><td>'+esc(u.email)+'</td><td>'+u.role+'</td>' +
        '<td><a href="#" onclick="openEdit('+u.id+')">Изм</a> | <a href="#" onclick="doDelete('+u.id+')">Удал</a></td></tr>';
    });
    document.getElementById('tbody').innerHTML = html || '<tr><td colspan="6" class="text-center text-muted">Нет данных</td></tr>';
    renderPages(d.pages, d.total);
  });
}

function renderPages(pages, total) {
  if (pages <= 1) { document.getElementById('pagination').innerHTML = '<small class="text-muted">Всего: '+total+'</small>'; return; }
  var html = '<ul class="pagination pagination-sm" style="margin:0 0 10px">';
  for (var i=1; i<=pages; i++) html += '<li'+(i===page?' class="active"':'')+'><a href="#" onclick="goPage('+i+')">'+i+'</a></li>';
  html += '</ul><small class="text-muted">Всего: '+total+'</small>';
  document.getElementById('pagination').innerHTML = html;
}

function goPage(p) { page = p; loadUsers(); return false; }

function loadStats() {
  api('GET', '/api/stats/summary', null, function(ok,d){
    if (!ok) return;
    document.getElementById('stats-text').textContent =
      'Всего: ' + d.total + ' | Средний возраст: ' + d.averageAge + ' | Мин: ' + d.minAge + ' | Макс: ' + d.maxAge;
  });
}

$('#userForm').on('submit', function(e){
  e.preventDefault();
  var id    = document.getElementById('edit-id').value;
  var name  = document.getElementById('f-name').value;
  var age   = document.getElementById('f-age').value;
  var email = document.getElementById('f-email').value;
  if (id == 0) {
    api('POST', '/api/users', {name:name,age:age,email:email}, function(ok,d){
      if (ok) { toast('Создан: '+d.name); resetForm(); loadUsers(); loadStats(); }
      else    toast(d.error||'Ошибка', false);
    });
  } else {
    api('PUT', '/api/users/'+id, {name:name,age:age,email:email}, function(ok,d){
      if (ok) { toast('Обновлён: '+d.name); resetForm(); loadUsers(); }
      else    toast(d.error||'Ошибка', false);
    });
  }
});

function openEdit(id) {
  api('GET', '/api/users/'+id, null, function(ok,u){
    if (!ok) return;
    document.getElementById('edit-id').value  = u.id;
    document.getElementById('f-name').value   = u.name;
    document.getElementById('f-age').value    = u.age;
    document.getElementById('f-email').value  = u.email;
    window.scrollTo(0,0);
  });
  return false;
}

function doDelete(id) {
  if (!confirm('Удалить пользователя #'+id+'?')) return false;
  api('DELETE', '/api/users/'+id, null, function(ok,d){
    if (ok) { toast('Удалён'); loadUsers(); loadStats(); }
    else    toast(d.error||'Ошибка', false);
  });
  return false;
}

function resetForm() {
  document.getElementById('edit-id').value = 0;
  document.getElementById('f-name').value  = '';
  document.getElementById('f-age').value   = '';
  document.getElementById('f-email').value = '';
}

function debounce() { clearTimeout(st); page=1; st=setTimeout(loadUsers, 350); }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
</script>
</body>
</html>
