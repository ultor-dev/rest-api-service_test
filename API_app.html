<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width" />
    <title>REST API Клиент</title>
    <link href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css" rel="stylesheet" />
    <script src="https://code.jquery.com/jquery-2.2.4.min.js"></script>
    <style>
        .auth-section { background: #f5f5f5; padding: 15px; border-radius: 5px; margin-bottom: 20px; }
        .token-display { word-break: break-all; font-size: 11px; }
        .rate-info { font-size: 12px; color: #666; }
        .search-box { margin-bottom: 15px; }
        .pagination { margin: 10px 0; }
        .stats-box { background: #e8f4e8; padding: 10px; border-radius: 5px; margin-bottom: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>REST API Клиент</h1>
        
        <!-- Секция авторизации -->
        <div class="auth-section">
            <h3>Авторизация</h3>
            <div class="row">
                <div class="col-md-4">
                    <div class="form-group">
                        <label>Имя пользователя:</label>
                        <input class="form-control" id="loginUsername" placeholder="admin или user" />
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="form-group">
                        <label>Пароль:</label>
                        <input type="password" class="form-control" id="loginPassword" placeholder="admin123 или user123" />
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="form-group">
                        <label>&nbsp;</label><br/>
                        <button class="btn btn-primary" onclick="login()">Войти</button>
                        <button class="btn btn-default" onclick="logout()">Выйти</button>
                    </div>
                </div>
            </div>
            <div id="authStatus" class="alert" style="display:none;"></div>
            <div id="tokenInfo" class="token-display" style="display:none;"></div>
        </div>

        <!-- Статистика -->
        <div class="stats-box" id="statsBox" style="display:none;">
            <h4>Статистика запросов</h4>
            <div id="statsContent"></div>
        </div>

        <!-- Поиск -->
        <div class="search-box">
            <div class="input-group">
                <input type="text" class="form-control" id="searchQuery" placeholder="Поиск пользователей..." />
                <span class="input-group-btn">
                    <button class="btn btn-info" onclick="searchUsers()">Поиск</button>
                    <button class="btn btn-default" onclick="clearSearch()">Очистить</button>
                </span>
            </div>
        </div>

        <!-- Форма пользователя -->
        <h2>Управление пользователями</h2>
        <form name="userForm">
            <input type="hidden" name="id" value="0" />
            <div class="form-group">
                <label for="name">Имя:</label>
                <input class="form-control" name="name" required />
            </div>
            <div class="form-group">
                <label for="age">Возраст:</label>
                <input type="number" class="form-control" name="age" min="0" max="150" />
            </div>
            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" class="form-control" name="email" />
            </div>
            <div class="panel-body">
                <button type="submit" class="btn btn-sm btn-primary">Сохранить</button>
                <a id="reset" class="btn btn-sm btn-primary">Сбросить</a>
            </div>
        </form>

        <!-- Таблица пользователей -->
        <h3>Список пользователей</h3>
        <div class="pagination" id="pagination"></div>
        <table class="table table-condensed table-striped table-bordered">
            <thead>
                <tr>
                    <th>Id</th>
                    <th>Имя</th>
                    <th>Возраст</th>
                    <th>Email</th>
                    <th>Действия</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <script>
        var authToken = localStorage.getItem('authToken');
        var currentUser = JSON.parse(localStorage.getItem('currentUser') || 'null');

        // Инициализация
        $(document).ready(function() {
            if (authToken) {
                showAuthStatus();
                loadStats();
            }
            GetUsers();
        });

        // ==================== АВТОРИЗАЦИЯ ====================

        function login() {
            var username = $('#loginUsername').val();
            var password = $('#loginPassword').val();

            $.ajax({
                url: '/api/auth/login',
                type: 'POST',
                contentType: 'application/json',
                data: JSON.stringify({ username: username, password: password }),
                success: function(response) {
                    authToken = response.token;
                    currentUser = response.user;
                    localStorage.setItem('authToken', authToken);
                    localStorage.setItem('currentUser', JSON.stringify(currentUser));
                    showAuthStatus();
                    loadStats();
                    GetUsers();
                },
                error: function(xhr) {
                    var error = xhr.responseJSON ? xhr.responseJSON.error : 'Ошибка авторизации';
                    $('#authStatus').removeClass('alert-success').addClass('alert-danger')
                        .text(error).show();
                }
            });
        }

        function logout() {
            authToken = null;
            currentUser = null;
            localStorage.removeItem('authToken');
            localStorage.removeItem('currentUser');
            $('#authStatus').hide();
            $('#tokenInfo').hide();
            $('#statsBox').hide();
            $('#loginUsername').val('');
            $('#loginPassword').val('');
        }

        function showAuthStatus() {
            $('#authStatus').removeClass('alert-danger').addClass('alert-success')
                .text('Авторизован как: ' + currentUser.username + ' (' + currentUser.role + ')').show();
            $('#tokenInfo').text('Токен: ' + authToken.substring(0, 50) + '...').show();
        }

        function getAuthHeaders() {
            return authToken ? { 'Authorization': 'Bearer ' + authToken } : {};
        }

        // ==================== СТАТИСТИКА ====================

        function loadStats() {
            $.ajax({
                url: '/api/stats',
                type: 'GET',
                headers: getAuthHeaders(),
                success: function(response) {
                    var html = '<div class="row">' +
                        '<div class="col-md-3">Запросов в минуту: ' + response.stats.requestsLastMinute + '</div>' +
                        '<div class="col-md-3">Лимит: ' + response.limits.maxRequests + '</div>' +
                        '<div class="col-md-3">Окно: ' + (response.limits.windowMs / 1000) + ' сек</div>' +
                        '<div class="col-md-3">Всего запросов: ' + response.stats.totalRequests + '</div>' +
                        '</div>';
                    $('#statsContent').html(html);
                    $('#statsBox').show();
                }
            });
        }

        // ==================== CRUD ОПЕРАЦИИ ====================

        var currentPage = 1;
        var totalPages = 1;

        // Получение всех пользователей с пагинацией
        function GetUsers(page) {
            page = page || currentPage;
            $.ajax({
                url: '/api/users?page=' + page + '&limit=5',
                type: 'GET',
                headers: getAuthHeaders(),
                success: function(response) {
                    var rows = '';
                    $.each(response.data, function(index, user) {
                        rows += row(user);
                    });
                    $('table tbody').html(rows);

                    // Обновляем пагинацию
                    currentPage = response.pagination.currentPage;
                    totalPages = response.pagination.totalPages;
                    renderPagination(response.pagination);
                },
                error: function(xhr) {
                    if (xhr.status === 401) {
                        logout();
                        alert('Необходима авторизация');
                    }
                }
            });
        }

        function renderPagination(pagination) {
            var html = '<nav><ul class="pagination">';
            
            // Предыдущая страница
            html += '<li class="' + (pagination.hasPrevPage ? '' : 'disabled') + '">' +
                '<a href="#" onclick="' + (pagination.hasPrevPage ? 'GetUsers(' + (pagination.currentPage - 1) + '); return false;' : 'return false;') + '">«</a></li>';
            
            // Номера страниц
            for (var i = 1; i <= pagination.totalPages; i++) {
                html += '<li class="' + (i === pagination.currentPage ? 'active' : '') + '">' +
                    '<a href="#" onclick="GetUsers(' + i + '); return false;">' + i + '</a></li>';
            }
            
            // Следующая страница
            html += '<li class="' + (pagination.hasNextPage ? '' : 'disabled') + '">' +
                '<a href="#" onclick="' + (pagination.hasNextPage ? 'GetUsers(' + (pagination.currentPage + 1) + '); return false;' : 'return false;') + '">»</a></li>';
            
            html += '</ul></nav>';
            html += '<span class="rate-info">Страница ' + pagination.currentPage + ' из ' + pagination.totalPages + 
                ' | Всего: ' + pagination.totalItems + ' записей</span>';
            
            $('#pagination').html(html);
        }

        // Получение одного пользователя
        function GetUser(id) {
            $.ajax({
                url: '/api/users/' + id,
                type: 'GET',
                headers: getAuthHeaders(),
                success: function(user) {
                    var form = document.forms['userForm'];
                    form.elements['id'].value = user.id;
                    form.elements['name'].value = user.name;
                    form.elements['age'].value = user.age || '';
                    form.elements['email'].value = user.email || '';
                }
            });
        }

        // Поиск пользователей
        function searchUsers() {
            var query = $('#searchQuery').val();
            if (!query) {
                GetUsers();
                return;
            }

            $.ajax({
                url: '/api/users/search?q=' + encodeURIComponent(query),
                type: 'GET',
                headers: getAuthHeaders(),
                success: function(response) {
                    var rows = '';
                    $.each(response.results, function(index, user) {
                        rows += row(user);
                    });
                    $('table tbody').html(rows);
                    $('#pagination').html('<span class="rate-info">Найдено: ' + response.count + ' результатов</span>');
                }
            });
        }

        function clearSearch() {
            $('#searchQuery').val('');
            GetUsers();
        }

        // Добавление пользователя
        function CreateUser(userName, userAge, userEmail) {
            $.ajax({
                url: '/api/users',
                contentType: 'application/json',
                method: 'POST',
                headers: getAuthHeaders(),
                data: JSON.stringify({
                    name: userName,
                    age: userAge ? parseInt(userAge) : undefined,
                    email: userEmail
                }),
                success: function(response) {
                    reset();
                    GetUsers();
                    loadStats();
                },
                error: function(xhr) {
                    var error = xhr.responseJSON ? xhr.responseJSON.message || xhr.responseJSON.error : 'Ошибка';
                    alert('Ошибка: ' + error);
                }
            });
        }

        // Изменение пользователя
        function EditUser(userId, userName, userAge, userEmail) {
            $.ajax({
                url: '/api/users/' + userId,
                contentType: 'application/json',
                method: 'PUT',
                headers: getAuthHeaders(),
                data: JSON.stringify({
                    name: userName,
                    age: userAge ? parseInt(userAge) : undefined,
                    email: userEmail
                }),
                success: function(response) {
                    reset();
                    GetUsers();
                    loadStats();
                },
                error: function(xhr) {
                    var error = xhr.responseJSON ? xhr.responseJSON.message || xhr.responseJSON.error : 'Ошибка';
                    alert('Ошибка: ' + error);
                }
            });
        }

        // Частичное обновление
        function PatchUser(userId, data) {
            $.ajax({
                url: '/api/users/' + userId,
                contentType: 'application/json',
                method: 'PATCH',
                headers: getAuthHeaders(),
                data: JSON.stringify(data),
                success: function(response) {
                    reset();
                    GetUsers();
                    loadStats();
                }
            });
        }

        // Сброс формы
        function reset() {
            var form = document.forms['userForm'];
            form.reset();
            form.elements['id'].value = 0;
        }

        // Удаление пользователя
        function DeleteUser(id) {
            if (!confirm('Вы уверены, что хотите удалить пользователя?')) {
                return;
            }

            $.ajax({
                url: '/api/users/' + id,
                contentType: 'application/json',
                method: 'DELETE',
                headers: getAuthHeaders(),
                success: function(response) {
                    GetUsers();
                    loadStats();
                },
                error: function(xhr) {
                    if (xhr.status === 403) {
                        alert('Недостаточно прав для удаления');
                    } else {
                        var error = xhr.responseJSON ? xhr.responseJSON.error : 'Ошибка';
                        alert('Ошибка: ' + error);
                    }
                }
            });
        }

        // Создание строки таблицы
        function row(user) {
            return '<tr data-rowid="' + user.id + '">' +
                '<td>' + user.id + '</td>' +
                '<td>' + (user.name || '') + '</td>' +
                '<td>' + (user.age || '') + '</td>' +
                '<td>' + (user.email || '') + '</td>' +
                '<td>' +
                    '<a class="editLink" data-id="' + user.id + '">Изменить</a> | ' +
                    '<a class="removeLink" data-id="' + user.id + '">Удалить</a>' +
                '</td></tr>';
        }

        // ==================== ОБРАБОТЧИКИ СОБЫТИЙ ====================

        // Сброс формы
        $('#reset').click(function(e) {
            e.preventDefault();
            reset();
        });

        // Отправка формы
        $('form').submit(function(e) {
            e.preventDefault();
            var id = this.elements['id'].value;
            var name = this.elements['name'].value;
            var age = this.elements['age'].value;
            var email = this.elements['email'].value;

            if (id == 0) {
                CreateUser(name, age, email);
            } else {
                EditUser(id, name, age, email);
            }
        });

        // Клик по ссылке Изменить
        $('body').on('click', '.editLink', function() {
            var id = $(this).data('id');
            GetUser(id);
        });

        // Клик по ссылке Удалить
        $('body').on('click', '.removeLink', function() {
            var id = $(this).data('id');
            DeleteUser(id);
        });
    </script>
</body>
</html>
